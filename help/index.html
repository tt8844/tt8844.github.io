    <style>
        :root {
            --sd-bg: #1c1e28;
            --sd-bg-soft: #242735;
            --sd-panel: rgba(33, 36, 49, 0.92);
            --sd-panel-soft: rgba(39, 43, 58, 0.82);
            --sd-border: rgba(229, 183, 120, 0.18);
            --sd-border-strong: rgba(229, 183, 120, 0.3);
            --sd-text: #f7f2e8;
            --sd-muted: #b8b2a5;
            --sd-accent: #e5b778;
            --sd-accent-deep: #c89443;
        }

        html,
        body {
            background:
                radial-gradient(circle at top left, rgba(229, 183, 120, 0.14), transparent 24%),
                radial-gradient(circle at 85% 12%, rgba(86, 120, 255, 0.12), transparent 22%),
                linear-gradient(180deg, #171922 0%, #1c1e28 100%) !important;
            color: var(--sd-text);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: radial-gradient(circle at center, black 42%, transparent 92%);
            pointer-events: none;
        }

        .layui-layout-admin .layui-body,
        .layuimini-container,
        .layuimini-page-anim,
        .mescroll,
        .layuimini-content-page {
            background: transparent !important;
        }
    </style>
    <!--[if lt IE 9]>

<body class="layui-layout-body layuimini-all">
<div class="layui-layout layui-layout-admin">
    <div>
        <div class="layui-body">
            <div class="mescroll"  id="mescroll-3">
                <div class="layuimini-content-page">
                </div>
            </div>

        </div>
    </div>
</div>
<script src="lib/layui-v2.6.7/layui.js" charset="utf-8"></script>
<script src="js/lay-config.js" charset="utf-8"></script>
<script src="js/utils.js" charset="utf-8"></script>
<script src="js/md5.min.js" charset="utf-8"></script>
<script src="js/mescroll.min.js" type="text/javascript" charset="utf-8"></script>
<script>
    layui.use(['jquery', 'layer','miniAdmin','miniPage'], function () {
        var $ = layui.jquery,
            layer = layui.layer,
            miniAdmin = layui.miniAdmin,
            miniPage = layui.miniPage;
 

        var index = 0;
        var options = {
            renderPageVersion: false,    // 初始化页面是否加版本号
            bgColorDefault: false,      // 主题默认配置
            multiModule: false,          // 是否开启多模块
            menuChildOpen: false,       // 是否默认展开菜单
            loadingTime: 0,             // 初始化加载时间
            pageAnim: true,             // 切换菜单动画
        };

        miniAdmin.render(options);
    });
</script>
